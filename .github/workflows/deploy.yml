name: Deploy Next.js Standalone to VPS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm build

      - name: Prepare deployment package
        run: |
          set -euo pipefail

          # Next.js standalone output does not include public or static assets.
          cp -r public .next/standalone/
          cp -r .next/static .next/standalone/.next/

          tar -czf release.tar.gz -C .next/standalone .

      - name: Upload to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: release.tar.gz
          target: ${{ secrets.REMOTE_TARGET }}

      - name: Deploy and restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail

            cd ${{ secrets.REMOTE_TARGET }}

            DEPLOY_ID=$(date +%s)
            DEPLOY_DIR="releases/$DEPLOY_ID"
            mkdir -p "$DEPLOY_DIR"

            tar -xzf release.tar.gz -C "$DEPLOY_DIR"
            rm release.tar.gz

            if [ -f ".env.local" ]; then
              cp .env.local "$DEPLOY_DIR/"
            fi

            ln -sfn "$DEPLOY_DIR" current

            echo "Deployed release: $DEPLOY_ID"
            if [ -f "current/.next/BUILD_ID" ]; then
              echo "Next BUILD_ID: $(cat current/.next/BUILD_ID)"
            fi

            if pm2 list | grep -q "wushi-website"; then
              pm2 reload ecosystem.config.js --update-env
            else
              pm2 start ecosystem.config.js
            fi

            find releases -mindepth 1 -maxdepth 1 -type d -printf '%T@ %p\n' \
              | sort -rn \
              | tail -n +6 \
              | cut -d' ' -f2- \
              | xargs -r rm -rf --
