name: Deploy Next.js Standalone to VPS

on:
  push:
    branches:
      - main # 触发分支

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.1
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build project
        run: pnpm build

      - name: Prepare Deployment Package
        run: |
          # Next.js standalone 模式不包含 static 和 public，需要手动补全
          cp -r public .next/standalone/
          cp -r .next/static .next/standalone/.next/
          
          # 打包产物
          tar -czf release.tar.gz -C .next/standalone .
          
      - name: Upload to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "release.tar.gz"
          target: ${{ secrets.REMOTE_TARGET }}

      - name: Deploy and Zero-Downtime Restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ secrets.REMOTE_TARGET }}
            
            # 1. 创建基于时间戳的新版本目录
            DEPLOY_ID=$(date +%s)
            mkdir -p releases/$DEPLOY_ID
            
            # 2. 解压到新目录
            tar -xzf release.tar.gz -C releases/$DEPLOY_ID
            rm release.tar.gz
            
            # 3. 复制 .env.local 到新目录（如果存在）
            if [ -f ".env.local" ]; then
              cp .env.local releases/$DEPLOY_ID/
            fi
            
            # 4. 原子化切换软链接：将 current 指向最新版本
            # -f 强制覆盖，-n 将链接视为普通文件（防止在链接上创建子链接）
            ln -sfn releases/$DEPLOY_ID current
            
            # 5. 使用 PM2 零停机重载 (依赖你已在 VPS 创建的 ecosystem.config.js)
            # --update-env 确保如果 .env.local 有变动，重启后能生效
            if pm2 list | grep -q "wushi-website"; then
              pm2 reload ecosystem.config.js --update-env
            else
              pm2 start ecosystem.config.js
            fi
            
            # 6. 清理旧版本，只保留最近的 5 个版本，防止磁盘爆满
            cd releases && ls -t | tail -n +6 | xargs rm -rf --
